apiVersion: v1
kind: Pod
metadata:
  name: affinity-required-large
spec:
  containers:
    - name: app
      image: nginx:stable-alpine3.23-perl
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: size
              operator: In
              values:
                - Large
