apiVersion: v1
kind: Pod
metadata:
  name: noexecute-toleration-pod
  labels:
    app: nginx
    lab: taints
spec:
  tolerations:
    - key: "app"
      operator: "Equal"
      value: "red"
      effect: "NoExecute"
      tolerationSeconds: 30
  containers:
    - name: nginx
      image: nginx:1.25-alpine
      ports:
        - containerPort: 80